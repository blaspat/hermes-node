name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build binaries
        run: ./scripts/build.sh "${{ github.ref_name }}"
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-formula:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - name: Update Homebrew formula
        run: |
          VERSION="${{ github.ref_name }}"
          URL="https://github.com/blaspat/hermes-nodes/archive/refs/tags/${VERSION}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)

          cat > Formula/hermes-node.rb <<EOF
          class HermesNode < Formula
            desc "Standalone Go binary that pairs a remote laptop with a Hermes Agent brain over WSS"
            homepage "https://github.com/blaspat/hermes-nodes"
            url "${URL}"
            sha256 "${SHA}"
            license "MIT"

            depends_on "go" => :build

            def install
              ldflags = "-s -w -X main.version=#{version}"
              system "go", "build", *std_go_args(ldflags: ldflags), "./cmd/hermes-node"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/hermes-node --version")
            end
          end
          EOF
      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update Homebrew formula to ${{ github.ref_name }}"
          branch: "auto/update-formula-${{ github.ref_name }}"
          title: "Update Homebrew formula to ${{ github.ref_name }}"
          body: "Automated update of Formula/hermes-node.rb for release ${{ github.ref_name }}."
          base: main
